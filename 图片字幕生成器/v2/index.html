<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaptionCraft - 图片字幕生成器</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Film Grain Overlay -->
    <div class="film-grain"></div>

    <!-- Header -->
    <header class="header">
        <div class="header-brand">
            <span class="header-logo">CC</span>
            <span class="header-name">CaptionCraft</span>
        </div>
        <p class="header-tagline">为照片赋予声音</p>
    </header>

    <!-- Main App -->
    <main class="app">
        <!-- Left Panel: Controls -->
        <aside class="panel panel-controls">
            <div class="panel-controls-inner">
            <!-- Upload Section -->
            <section class="control-section">
                <h2 class="section-title">
                    <span class="section-icon">◉</span>
                    上传图片
                </h2>
                <div class="upload-zone" id="uploadZone">
                    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" hidden>
                    <div class="upload-content">
                        <div class="upload-icon">
                            <svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.5">
                                <rect x="8" y="12" width="32" height="32" rx="4"/>
                                <circle cx="24" cy="28" r="6"/>
                                <path d="M8 32l10-10 8 8 14-14"/>
                                <path d="M36 8v12M30 14l6-6 6 6"/>
                            </svg>
                        </div>
                        <p class="upload-text">点击或拖拽上传图片</p>
                        <p class="upload-hint">支持 JPG、PNG、WebP，最大 20MB</p>
                    </div>
                </div>
                <div class="file-info" id="fileInfo" style="display: none;">
                    <span class="file-name" id="fileName"></span>
                    <button class="file-replace" id="replaceFile">更换</button>
                </div>
            </section>

            <!-- Settings Section -->
            <section class="control-section">
                <h2 class="section-title">
                    <span class="section-icon">◎</span>
                    字幕设置
                </h2>

                <div class="control-group">
                    <label class="control-label">
                        <span>字幕高度</span>
                        <span class="control-value" id="barHeightValue">80px</span>
                    </label>
                    <input type="range" class="control-slider" id="barHeight" min="24" max="200" value="80">
                </div>

                <div class="control-group">
                    <label class="control-label">
                        <span>字体大小</span>
                        <span class="control-value" id="fontSizeValue">40px</span>
                    </label>
                    <input type="range" class="control-slider" id="fontSize" min="12" max="120" value="40">
                </div>

                <div class="control-row">
                    <div class="control-group half">
                        <label class="control-label">字体颜色</label>
                        <div class="color-picker-wrapper">
                            <input type="color" class="color-picker" id="fontColor" value="#ffffff">
                            <span class="color-value">#FFFFFF</span>
                        </div>
                    </div>
                    <div class="control-group half">
                        <label class="control-label">轮廓颜色</label>
                        <div class="color-picker-wrapper">
                            <input type="color" class="color-picker" id="strokeColor" value="#000000">
                            <span class="color-value">#000000</span>
                        </div>
                    </div>
                </div>

                <div class="control-row">
                    <div class="control-group half">
                        <label class="control-label">字体样式</label>
                        <select class="control-select" id="fontFamily">
                            <option value="Microsoft YaHei, sans-serif">微软雅黑</option>
                            <option value="PingFang SC, sans-serif">苹方</option>
                            <option value="Noto Sans SC, sans-serif">思源黑体</option>
                            <option value="SimSun, serif">宋体</option>
                            <option value="KaiTi, serif">楷体</option>
                            <option value="Arial, sans-serif">Arial</option>
                            <option value="Georgia, serif">Georgia</option>
                        </select>
                    </div>
                    <div class="control-group half">
                        <label class="control-label">字体粗细</label>
                        <select class="control-select" id="fontWeight">
                            <option value="400">正常</option>
                            <option value="300">细体</option>
                            <option value="500">中等</option>
                            <option value="600">半粗</option>
                            <option value="700">粗体</option>
                        </select>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">背景条颜色</label>
                    <div class="color-picker-wrapper with-alpha">
                        <input type="color" class="color-picker" id="bgColor" value="#000000">
                        <span class="color-value">#000000</span>
                        <label class="alpha-label">透明度</label>
                        <input type="range" class="alpha-slider" id="bgAlpha" min="0" max="100" value="60">
                        <span class="alpha-value" id="bgAlphaValue">60%</span>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">
                        <span>行间距</span>
                        <span class="control-value" id="lineGapValue">8px</span>
                    </label>
                    <input type="range" class="control-slider" id="lineGap" min="0" max="30" value="8">
                </div>

                <div class="control-group">
                    <label class="control-label">
                        <span>圆角</span>
                        <span class="control-value" id="borderRadiusValue">8px</span>
                    </label>
                    <input type="range" class="control-slider" id="borderRadius" min="0" max="30" value="8">
                </div>

                <div class="control-group">
                    <label class="control-label">
                        <span>背景条边框</span>
                        <span class="control-value" id="barBorderValue">2px</span>
                    </label>
                    <input type="range" class="control-slider" id="barBorderWidth" min="0" max="8" value="2">
                </div>

                <div class="control-group">
                    <label class="control-label">边框颜色</label>
                    <div class="color-picker-wrapper">
                        <input type="color" class="color-picker" id="barBorderColor" value="#ffffff">
                        <span class="color-value">#FFFFFF</span>
                    </div>
                </div>
            </section>

            <!-- Watermark Section -->
            <section class="control-section watermark-section">
                <h2 class="section-title">
                    <span class="section-icon">✦</span>
                    水印设置
                </h2>

                <div class="control-group">
                    <label class="control-label">水印文字</label>
                    <input type="text" class="text-input watermark-text" id="watermarkText" value="么么哒哒" placeholder="输入水印文字">
                </div>

                <div class="control-row">
                    <div class="control-group half">
                        <label class="control-label">位置</label>
                        <select class="control-select" id="watermarkPosition">
                            <option value="top-center">顶部居中</option>
                            <option value="top-left">左上</option>
                            <option value="top-right">右上</option>
                            <option value="bottom-center">底部居中</option>
                            <option value="bottom-left">左下</option>
                            <option value="bottom-right">右下</option>
                            <option value="center">中心</option>
                        </select>
                    </div>
                    <div class="control-group half">
                        <label class="control-label">样式</label>
                        <select class="control-select" id="watermarkStyle">
                            <option value="glass">毛玻璃</option>
                            <option value="solid">实心</option>
                            <option value="outline">描边</option>
                            <option value="shadow">阴影</option>
                        </select>
                    </div>
                </div>

                <div class="control-group">
                    <label class="control-label">
                        <span>水印大小</span>
                        <span class="control-value" id="watermarkSizeValue">24px</span>
                    </label>
                    <input type="range" class="control-slider" id="watermarkSize" min="12" max="72" value="24">
                </div>

                <div class="control-group">
                    <label class="control-label">
                        <span>透明度</span>
                        <span class="control-value" id="watermarkAlphaValue">70%</span>
                    </label>
                    <input type="range" class="control-slider" id="watermarkAlpha" min="20" max="100" value="70">
                </div>
            </section>

            <!-- Text Input Section -->
            <section class="control-section">
                <h2 class="section-title">
                    <span class="section-icon">✎</span>
                    字幕内容
                </h2>
                <textarea class="text-input" id="captionText" placeholder="在此输入字幕内容...&#10;每行将作为一个字幕条&#10;最多支持50行"></textarea>
                <p class="text-hint" id="lineCount">0 / 50 行</p>
            </section>

            <!-- Actions -->
            <section class="control-section actions">
                <button class="btn btn-secondary" id="generateBtn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <path d="M21 15l-5-5L5 21"/>
                    </svg>
                    生成字幕图片
                </button>
                <button class="btn btn-primary" id="downloadBtn" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    保存图片
                </button>
            </section>

            <!-- Status -->
            <div class="status" id="status"></div>
            </div>
        </aside>

        <!-- Right Panel: Preview -->
        <section class="panel panel-preview">
            <div class="preview-header">
                <h2 class="preview-title">实时预览</h2>
                <span class="preview-dimensions" id="dimensions">-- x --</span>
            </div>
            <div class="preview-container" id="previewContainer">
                <div class="preview-placeholder" id="placeholder">
                    <div class="placeholder-icon">
                        <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5">
                            <rect x="8" y="12" width="48" height="40" rx="4"/>
                            <circle cx="24" cy="28" r="6"/>
                            <path d="M8 44l16-16 12 12 20-20"/>
                        </svg>
                    </div>
                    <p>上传图片以开始预览</p>
                </div>
                <canvas class="preview-canvas" id="previewCanvas" style="display: none;"></canvas>
            </div>
        </section>
    </main>

    <!-- Hidden canvas for export -->
    <canvas id="exportCanvas" style="display: none;"></canvas>

    <script src="script.js"></script>
</body>
</html>
